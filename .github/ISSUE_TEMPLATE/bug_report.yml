name: Bug report
description: Report a reproducible defect in Groc.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide a reproducible case.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the defect.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact commands and sequence to reproduce.
      placeholder: |
        1. Run `groc ...`
        2. Run `groc ...`
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste `groc --version`, `groc doctor`, OS, and shell details.
      placeholder: |
        groc --version:
        groc doctor:
        OS:
        Shell:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Relevant output only. Remove secrets or private data.
      placeholder: Paste output or attach screenshots.

