name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify
        run: make verify
      - name: Package Groc
        run: scripts/package-release.sh "${GITHUB_REF_NAME}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/groc-"${GITHUB_REF_NAME}".tar.gz dist/groc-"${GITHUB_REF_NAME}".zip --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/groc-"${GITHUB_REF_NAME}".tar.gz dist/groc-"${GITHUB_REF_NAME}".zip --generate-notes
          fi
